syntax = "proto3";

package ledger.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/rbaliyan/ledger/api/ledger/v1;ledgerv1";

// LedgerService exposes the append-only log operations over gRPC.
//
// Every request must carry the "x-ledger-store" gRPC metadata header, which
// selects the target store (table / collection). The server routes each call
// to the appropriate backend based on this header. Within a store, individual
// log instances are identified by the "stream" field in each request.
service LedgerService {
  // Append adds entries to the named stream.
  // Entries whose DedupKey already exists in the stream are silently skipped.
  // Returns the IDs assigned to newly written entries (skipped entries are omitted).
  rpc Append(AppendRequest) returns (AppendResponse) {
    option (google.api.http) = {
      post: "/v1/streams/{stream}/entries"
      body: "*"
    };
  }

  // Read returns entries from the named stream, ordered by ID.
  // An empty stream returns an empty list (not an error).
  // Query params: options.after, options.limit, options.desc, options.order_key, options.tag, options.all_tags.
  rpc Read(ReadRequest) returns (ReadResponse) {
    option (google.api.http) = {
      get: "/v1/streams/{stream}/entries"
    };
  }

  // Count returns the total number of entries in the named stream.
  rpc Count(CountRequest) returns (CountResponse) {
    option (google.api.http) = {
      get: "/v1/streams/{stream}/entries:count"
    };
  }

  // SetTags replaces all tags on an existing entry.
  // Returns NOT_FOUND if the entry does not exist.
  rpc SetTags(SetTagsRequest) returns (SetTagsResponse) {
    option (google.api.http) = {
      put: "/v1/streams/{stream}/entries/{id}/tags"
      body: "*"
    };
  }

  // SetAnnotations merges key-value annotations onto an existing entry.
  // Keys present in "set" are upserted; keys present in "delete" are removed.
  // Returns NOT_FOUND if the entry does not exist.
  rpc SetAnnotations(SetAnnotationsRequest) returns (SetAnnotationsResponse) {
    option (google.api.http) = {
      patch: "/v1/streams/{stream}/entries/{id}/annotations"
      body: "*"
    };
  }

  // Trim deletes entries whose ID is less than or equal to before_id.
  // Returns the number of entries deleted.
  rpc Trim(TrimRequest) returns (TrimResponse) {
    option (google.api.http) = {
      post: "/v1/streams/{stream}/entries:trim"
      body: "*"
    };
  }

  // ListStreamIDs returns distinct stream IDs that have at least one entry.
  // Streams that have been fully trimmed are not returned.
  // Results are ascending by stream ID and cursor-paginated via after / limit.
  // Query params: after, limit.
  rpc ListStreamIDs(ListStreamIDsRequest) returns (ListStreamIDsResponse) {
    option (google.api.http) = {
      get: "/v1/streams"
    };
  }

  // RenameStream changes the human-readable name of a stream without touching
  // its entries. Returns NOT_FOUND if the current name does not exist.
  rpc RenameStream(RenameStreamRequest) returns (RenameStreamResponse) {
    option (google.api.http) = {
      post: "/v1/streams/{name}:rename"
      body: "*"
    };
  }

  // Stat returns metrics for a stream, including entry count and first/last entry IDs.
  rpc Stat(StatRequest) returns (StatResponse) {
    option (google.api.http) = {
      get: "/v1/streams/{stream}:stat"
    };
  }

  // Search performs a substring / full-text search on entry payloads.
  // Returns UNIMPLEMENTED if the backend does not support search.
  rpc Search(SearchRequest) returns (SearchResponse) {
    option (google.api.http) = {
      post: "/v1/streams/{stream}/entries:search"
      body: "*"
    };
  }

  // Health reports backend connectivity. Returns status "ok" on success,
  // or a description of the problem on failure.
  rpc Health(HealthRequest) returns (HealthResponse) {
    option (google.api.http) = {
      get: "/v1/health"
    };
  }
}

// ─── shared types ────────────────────────────────────────────────────────────

// EntryInput describes a single entry to be appended.
message EntryInput {
  // payload is the raw serialised payload bytes (JSON, protobuf, etc.).
  // The server stores it verbatim; no re-encoding is performed.
  bytes payload = 1;

  // order_key is an optional secondary ordering key used for filtering
  // (e.g., an aggregate ID or category string).
  string order_key = 2;

  // dedup_key enables idempotent appends. If a non-empty key already exists
  // in the stream the entry is silently skipped. Empty means no dedup.
  string dedup_key = 3;

  // schema_version is stamped on the entry at write time. Defaults to 1.
  int64 schema_version = 4;

  // metadata is immutable key-value data set at append time
  // (e.g., trace_id, source, tenant_id).
  map<string, string> metadata = 5;

  // tags is the initial set of mutable labels on the entry.
  repeated string tags = 6;
}

// Entry is a stored ledger entry returned by Read.
message Entry {
  // id is the store-assigned unique identifier. The format depends on the
  // backend: decimal int64 string for SQLite/PostgreSQL, MongoDB ObjectID
  // hex string, or a 32-char time-ordered hex string for ClickHouse.
  string id = 1;

  // stream is the stream this entry belongs to.
  string stream = 2;

  // payload is the raw serialised payload as stored (see EntryInput.payload).
  bytes payload = 3;

  string order_key = 4;
  string dedup_key = 5;

  // schema_version is the version stamped at write time.
  int64 schema_version = 6;

  // metadata is the immutable key-value data set at append time.
  map<string, string> metadata = 7;

  // tags are the current mutable labels on the entry.
  repeated string tags = 8;

  // annotations are the current mutable key-value state on the entry.
  map<string, string> annotations = 9;

  // created_at is the timestamp when the entry was stored.
  google.protobuf.Timestamp created_at = 10;

  // updated_at is the timestamp of the last tag or annotation update,
  // absent if the entry has never been mutated.
  google.protobuf.Timestamp updated_at = 11;
}

// ReadOptions configures how entries are fetched from a stream.
// All fields are optional; zero values mean "use the backend default".
message ReadOptions {
  // after is the cursor: only entries whose ID is strictly greater than this
  // value are returned. Empty string means "from the beginning".
  string after = 1;

  // limit caps the number of entries returned. 0 means the backend default (100).
  int64 limit = 2;

  // desc returns entries newest-first (descending by ID) when true.
  bool desc = 3;

  // order_key filters entries by their order_key field.
  string order_key = 4;

  // tag filters entries that carry this single tag.
  string tag = 5;

  // all_tags filters entries that carry ALL of the specified tags.
  repeated string all_tags = 6;
}

// ─── Append ──────────────────────────────────────────────────────────────────

message AppendRequest {
  // stream is the stream to append to. Must not be empty.
  string stream = 1;

  // entries is the batch of entries to append. An empty batch is a no-op.
  repeated EntryInput entries = 2;
}

message AppendResponse {
  // ids are the store-assigned IDs for entries that were successfully written.
  // Deduplicated (skipped) entries are absent from this list.
  // The order matches the order of non-skipped entries in the request.
  repeated string ids = 1;
}

// ─── Read ─────────────────────────────────────────────────────────────────────

message ReadRequest {
  // stream is the stream to read from. Must not be empty.
  string stream = 1;

  // options configures filtering, ordering, and pagination.
  ReadOptions options = 2;
}

message ReadResponse {
  repeated Entry entries = 1;
}

// ─── Count ───────────────────────────────────────────────────────────────────

message CountRequest {
  string stream = 1;
}

message CountResponse {
  int64 count = 1;
}

// ─── SetTags ─────────────────────────────────────────────────────────────────

message SetTagsRequest {
  string stream = 1;

  // id is the entry ID as returned by Append or Read.
  string id = 2;

  // tags replaces the entire tag list on the entry.
  repeated string tags = 3;
}

message SetTagsResponse {}

// ─── SetAnnotations ──────────────────────────────────────────────────────────

message SetAnnotationsRequest {
  string stream = 1;

  // id is the entry ID as returned by Append or Read.
  string id = 2;

  // set contains key-value pairs to upsert onto the entry's annotations.
  map<string, string> set = 3;

  // delete lists annotation keys to remove from the entry.
  repeated string delete = 4;
}

message SetAnnotationsResponse {}

// ─── Trim ─────────────────────────────────────────────────────────────────────

message TrimRequest {
  string stream = 1;

  // before_id — all entries whose ID is less than or equal to this value
  // are deleted from the stream.
  string before_id = 2;
}

message TrimResponse {
  // deleted is the number of entries that were removed.
  int64 deleted = 1;
}

// ─── ListStreamIDs ────────────────────────────────────────────────────────────

message ListStreamIDsRequest {
  // after is the cursor: only stream IDs strictly greater than this value
  // are returned. Empty string means "from the beginning".
  string after = 1;

  // limit caps the number of IDs returned. 0 means the backend default (100).
  int64 limit = 2;
}

message ListStreamIDsResponse {
  // stream_ids is the ordered list of distinct stream IDs with at least one entry.
  repeated string stream_ids = 1;
}

// ─── RenameStream ─────────────────────────────────────────────────────────────

message RenameStreamRequest {
  // name is the current human-readable stream name.
  string name = 1;

  // new_name is the desired new name for the stream.
  string new_name = 2;
}

message RenameStreamResponse {}

// ─── Stat ────────────────────────────────────────────────────────────────────

message StatRequest {
  string stream = 1;
}

message StatResponse {
  string stream = 1;
  int64 count = 2;
  string first_id = 3;
  string last_id = 4;
}

// ─── Search ──────────────────────────────────────────────────────────────────

message SearchRequest {
  // stream is the stream to search within. Empty searches all streams in the store.
  string stream = 1;

  // query is the search term. Syntax depends on the backend
  // (substring LIKE for SQLite/PostgreSQL, $text for MongoDB).
  string query = 2;

  // options controls pagination and ordering of results.
  ReadOptions options = 3;
}

message SearchResponse {
  repeated Entry entries = 1;
}

// ─── Health ──────────────────────────────────────────────────────────────────

message HealthRequest {}

message HealthResponse {
  // status is "ok" when the backend is reachable, or an error description otherwise.
  string status = 1;
}
