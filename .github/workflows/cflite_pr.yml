name: ClusterFuzzLite PR

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  fuzz:
    name: Fuzz (PR)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@52ecc61cb587ee99c26825a112a21abf19c7448c # v1
        with:
          language: go
          sanitizer: address

      - name: Run fuzzers
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@52ecc61cb587ee99c26825a112a21abf19c7448c # v1
        with:
          mode: code-change
          fuzz-seconds: 60
          output-sarif: true

      - name: Upload SARIF
        if: always() && steps.run.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v3
        with:
          sarif_file: cifuzz-sarif/results.sarif
          checkout_path: ${{ github.workspace }}
